{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ai-observability.fullname" . }}-agent
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app: {{ include "ai-observability.fullname" . }}-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ include "ai-observability.fullname" . }}-agent
        {{- include "ai-observability.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ai-observability.serviceAccountName" . }}-agent
      terminationGracePeriodSeconds: 30
      hostNetwork: false
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AI_ENGINE_ADDRESS
              value: "{{ include "ai-observability.fullname" . }}-engine:{{ .Values.aiEngine.service.grpcPort }}"
            - name: FLUSH_INTERVAL_SECONDS
              value: "{{ .Values.agent.config.flushIntervalSeconds }}"
            - name: BATCH_SIZE
              value: "{{ .Values.agent.config.batchSize }}"
            - name: LOG_TAIL_LINES
              value: "{{ .Values.agent.config.logTailLines }}"
            - name: WATCH_NAMESPACE
              value: "{{ .Values.agent.config.watchNamespace }}"
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["/agent", "-health-check"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          {{- with .Values.agent.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
