{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-observability.serviceAccountName" . }}-agent
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}

---
# ClusterRole: agent needs read access to pods, logs, events, metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-observability.fullname" . }}-agent
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "events", "persistentvolumeclaims", "resourcequotas", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings", "rolebindings", "clusterroles", "roles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-observability.fullname" . }}-agent
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-observability.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "ai-observability.serviceAccountName" . }}-agent
    namespace: {{ .Values.global.namespace }}
{{- end }}
