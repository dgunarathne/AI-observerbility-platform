{{- if .Values.aiEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-observability.fullname" . }}-engine
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ai-observability.fullname" . }}-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "ai-observability.fullname" . }}-engine
        {{- include "ai-observability.labels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ai-observability.serviceAccountName" . }}-engine
      containers:
        - name: ai-engine
          image: "{{ .Values.aiEngine.image.repository }}:{{ .Values.aiEngine.image.tag }}"
          imagePullPolicy: {{ .Values.aiEngine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.aiEngine.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.aiEngine.service.grpcPort }}
          env:
            - name: HTTP_PORT
              value: "{{ .Values.aiEngine.service.httpPort }}"
            - name: GRPC_PORT
              value: "{{ .Values.aiEngine.service.grpcPort }}"
            - name: LLM_PROVIDER
              value: "{{ .Values.aiEngine.llmProvider }}"
            - name: OPENAI_MODEL
              value: "{{ .Values.aiEngine.openaiModel }}"
            - name: OLLAMA_BASE_URL
              value: "{{ .Values.aiEngine.ollamaBaseUrl }}"
            - name: OLLAMA_MODEL
              value: "{{ .Values.aiEngine.ollamaModel }}"
            - name: ANOMALY_SENSITIVITY
              value: "{{ .Values.aiEngine.anomalySensitivity }}"
            - name: PREDICTION_THRESHOLD
              value: "{{ .Values.aiEngine.predictionThreshold }}"
            - name: PREDICTION_HORIZON_MINUTES
              value: "{{ .Values.aiEngine.predictionHorizonMinutes }}"
            - name: RCA_LOG_LOOKBACK_MINUTES
              value: "{{ .Values.aiEngine.rcaLogLookbackMinutes }}"
            - name: SLACK_CHANNEL
              value: "{{ .Values.alertManager.slack.channel }}"
            - name: ALERT_COOLDOWN_MINUTES
              value: "{{ .Values.alertManager.cooldownMinutes }}"
            # Secrets from the secret resource
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: anthropic-api-key
                  optional: true
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: slack-webhook-url
                  optional: true
            - name: TEAMS_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: teams-webhook-url
                  optional: true
            - name: PAGERDUTY_ROUTING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: pagerduty-routing-key
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-observability.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://{{ include "ai-observability.fullname" . }}-redis-master:6379/0"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
{{- end }}
