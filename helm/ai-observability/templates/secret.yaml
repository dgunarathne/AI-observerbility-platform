apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-observability.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-observability.labels" . | nindent 4 }}
type: Opaque
stringData:
  openai-api-key: {{ .Values.aiEngine.openaiApiKey | quote }}
  anthropic-api-key: {{ .Values.aiEngine.anthropicApiKey | quote }}
  slack-webhook-url: {{ .Values.alertManager.slack.webhookUrl | quote }}
  teams-webhook-url: {{ .Values.alertManager.teams.webhookUrl | quote }}
  pagerduty-routing-key: {{ .Values.alertManager.pagerduty.routingKey | quote }}
  database-url: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "ai-observability.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
